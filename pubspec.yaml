name: sm_technology
description: A new Flutter project.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  get_storage: ^2.1.1

  # 🔥 State Management + Routing + Dependency Injection
  get: ^4.6.6

  # 🌐 API Client
  dio: ^5.9.1

  # 💾 Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # 🔐 Small Data Storage
  shared_preferences: ^2.2.3

  # 🌍 Internet Check
  connectivity_plus: ^5.0.2
  image_picker: ^1.0.7

  # ✅ Responsive
  flutter_screenutil: ^5.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Hive Code Generation
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true